# Local dev dependencies for Workshop Buddy.
# Usage: docker compose up -d  (then: pnpm prisma migrate dev)
services:
  postgres:
    image: postgres:16-alpine
    container_name: wb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
      POSTGRES_DB: workshop_buddy
    ports:
      - "5432:5432"
    volumes:
      - wb-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop_buddy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wb-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wb-pgdata:
  wb-redisdata:
